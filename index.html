<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Метро Санкт-Петербурга</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --line1: #e63946;
    --line2: #4895ef;
    --line3: #2dc653;
    --line4: #f4a261;
    --line5: #9b5de5;
    --line6: #8B4513;
    --panel-w: 360px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'PT Sans', sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }
  #map-container {
    flex: 1;
    overflow: auto;
    position: relative;
    background: #0a1628;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(72,149,239,0.05) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(155,93,229,0.05) 0%, transparent 60%);
  }
  
  #project-credits {
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(22, 27, 34, 0.92);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    backdrop-filter: blur(8px);
    z-index: 5;
    pointer-events: none; 
  }
  #project-credits h1 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  #project-credits .author {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  #map-svg {
    display: block;
    min-width: 1000px;
    min-height: 900px;
    cursor: default;
  }
  .station-dot {
    cursor: pointer;
    transition: all 0.2s;
  }
  .station-dot:hover circle { filter: brightness(1.6); }
  .station-dot.active circle {
    stroke: #fff !important;
    stroke-width: 3 !important;
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.8));
  }
  .station-label {
    font-family: 'PT Sans', sans-serif;
    font-size: 11px;
    fill: #c9d1d9;
    pointer-events: none;
    user-select: none;
  }
  /* SIDE PANEL */
  #panel {
    width: var(--panel-w);
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transform: translateX(0);
    transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    position: relative;
    z-index: 10;
    overflow: hidden;
  }
  #panel.hidden { transform: translateX(var(--panel-w)); }
  #panel-header {
    padding: 24px 24px 16px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, #1a1f2e 0%, #161b22 100%);
    flex-shrink: 0;
  }
  #panel-line-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  #panel-line-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  #panel-name {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 4px;
  }
  #panel-open-year {
    font-size: 12px;
    color: var(--muted);
  }
  #panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  #panel-body::-webkit-scrollbar { width: 4px; }
  #panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 18px 0 8px;
  }
  .section-title:first-child { margin-top: 0; }
  #panel-description {
    font-size: 14px;
    line-height: 1.7;
    color: #adbac7;
  }
  #panel-facts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .fact-card {
    background: #1c2128;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
  }
  .fact-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .fact-value { font-size: 14px; font-weight: 700; color: var(--text); }
  #panel-history {
    font-size: 13px;
    line-height: 1.75;
    color: #8b949e;
  }
  #panel-close {
    position: absolute;
    top: 16px; right: 16px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #1c2128;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
  }
  #panel-close:hover { background: #30363d; color: var(--text); }
  #welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 32px;
    text-align: center;
    gap: 12px;
  }
  #welcome svg { opacity: 0.2; }
  #welcome h2 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--text);
    opacity: 0.7;
  }
  #welcome p { font-size: 13px; color: var(--muted); line-height: 1.6; }
  /* legend */
  #legend {
    position: absolute;
    bottom: 16px; left: 16px;
    background: rgba(22,27,34,0.92);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    backdrop-filter: blur(8px);
  }
  .leg-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>

const LINE_NAMES = {1:"Кировско-Выборгская",2:"Московско-Петроградская",3:"Невско-Василеостровская",4:"Фрунзенско-Приморская",5:"Фрунзенско-Приморская (фиолетовая)",6:"Красносельско-Калининская"};

let activeStation = null;

document.querySelectorAll('.station-dot').forEach(el => {
  el.addEventListener('click', () => {
    const id = el.dataset.id;
    const data = STATIONS[id];
    if (!data) return;
    if (activeStation) activeStation.classList.remove('active');
    el.classList.add('active');
    activeStation = el;
    showPanel(data);
  });
});

function showPanel(data) {
  const panel = document.getElementById('panel');
  const content = document.getElementById('panel-content');
  content.innerHTML = `
    <div id="panel-header">
      <div id="panel-line-badge">
        <div id="panel-line-dot" style="background:${data.lineColor}"></div>
        Линия ${data.line} — ${LINE_NAMES[data.line]}
      </div>
      <div id="panel-name">${data.name}</div>
      <div id="panel-open-year">Открыта: ${data.opened} · ${data.district}</div>
    </div>
    <div id="panel-body">
      <div class="section-title">О станции</div>
      <div id="panel-description">${data.description}</div>
      <div class="section-title">Факты</div>
      <div id="panel-facts">
        <div class="fact-card"><div class="fact-label">Год открытия</div><div class="fact-value">${data.opened}</div></div>
        <div class="fact-card"><div class="fact-label">Глубина</div><div class="fact-value">${data.depth}</div></div>
        <div class="fact-card"><div class="fact-label">Район</div><div class="fact-value">${data.district}</div></div>
        <div class="fact-card"><div class="fact-label">Линия №</div><div class="fact-value" style="color:${data.lineColor}">${data.line}</div></div>
      </div>
      <div class="section-title">История</div>
      <div id="panel-history">${data.history}</div>
    </div>
  `;

  const closeBtn = document.createElement('button');
  closeBtn.id = 'panel-close';
  closeBtn.innerHTML = '✕';
  closeBtn.onclick = closePanel;
  content.appendChild(closeBtn);
  panel.classList.remove('hidden');
}

function closePanel() {
  document.getElementById('panel').classList.add('hidden');
  if (activeStation) { activeStation.classList.remove('active'); activeStation = null; }
}
